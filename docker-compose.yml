version: '3.8'

services:
  openclaw:
    image: alpine/openclaw:latest
    user: "1000:1000"  # Match node user ID in container
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data/workspace:/home/node/.openclaw/workspace
      - ./data/config:/home/node/.openclaw/config
    environment:
      - NODE_ENV=production
      # Optional: Set your timezone
      - TZ=Europe/Amsterdam
      # Optional: Authentication token
      # - OPENCLAW_AUTH_TOKEN=your_token_here
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

# Data directories will be created locally
# Run: mkdir -p ./data/workspace ./data/config && chown -R 1000:1000 ./data

# Optional: Network configuration
networks:
  default:
    name: openclaw_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16